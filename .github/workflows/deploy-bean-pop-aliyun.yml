name: Deploy Bean Pop To Aliyun

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-bean-pop-aliyun.yml'
      - 'bean-pop-studio/**'
      - 'ops/nginx/**'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-bean-pop-aliyun.yml'
      - 'bean-pop-studio/**'
      - 'ops/nginx/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bean-pop-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ci
    env:
      SSH_PORT: ${{ secrets.ALIYUN_SSH_PORT }}
      APP_DIR: /opt/apps/bean-pop-studio
      NGINX_SERVER_NAMES: ${{ vars.BEAN_POP_SERVER_NAMES }}
      NGINX_SITE_NAME: site-bean-pop
      NGINX_SITE_DIR: /etc/nginx/conf.d
      CLIENT_MAX_BODY_SIZE: 50m

    defaults:
      run:
        working-directory: bean-pop-studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bean-pop-studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release bundle
        run: tar -czf "$GITHUB_WORKSPACE/bean-pop-release.tgz" dist

      - name: Render Nginx config
        id: render_nginx
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          raw_server_names = os.environ.get("NGINX_SERVER_NAMES", "")
          tokens = [token for token in re.split(r"[\s,]+", raw_server_names.strip()) if token]

          if not tokens:
              raise SystemExit("GitHub variable BEAN_POP_SERVER_NAMES is required.")

          app_dir = os.environ.get("APP_DIR") or "/opt/apps/bean-pop-studio"
          app_root = f"{app_dir}/current/dist"

          server_names = []
          for token in tokens:
              token = token.strip()
              if not token:
                  continue
              server_names.append(token.encode("idna").decode("ascii"))

          values = {
              "__SERVER_NAMES__": " ".join(server_names),
              "__APP_ROOT__": app_root,
              "__CLIENT_MAX_BODY_SIZE__": os.environ.get("CLIENT_MAX_BODY_SIZE") or "50m",
          }

          rendered = Path("ops/nginx/static-spa.conf.template").read_text()
          for placeholder, value in values.items():
              rendered = rendered.replace(placeholder, value)

          output_path = Path("bean-pop-nginx.conf")
          output_path.write_text(rendered)

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a") as fh:
              fh.write(f"site_name={os.environ.get('NGINX_SITE_NAME') or 'site-bean-pop'}\n")
              fh.write(f"site_dir={os.environ.get('NGINX_SITE_DIR') or '/etc/nginx/conf.d'}\n")
              fh.write(f"app_dir={app_dir}\n")
          PY

      - name: Configure SSH key
        working-directory: ${{ github.workspace }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "${SSH_PORT:-22}" "${{ secrets.ALIYUN_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Upload release bundle
        working-directory: ${{ github.workspace }}
        run: |
          scp -P "${SSH_PORT:-22}" bean-pop-release.tgz \
            "${{ secrets.ALIYUN_SSH_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/bean-pop-${GITHUB_SHA}.tgz"

      - name: Upload Nginx config
        working-directory: ${{ github.workspace }}
        run: |
          scp -P "${SSH_PORT:-22}" bean-pop-nginx.conf \
            "${{ secrets.ALIYUN_SSH_USER }}@${{ secrets.ALIYUN_HOST }}:/tmp/bean-pop-nginx-${GITHUB_SHA}.conf"

      - name: Deploy on server
        working-directory: ${{ github.workspace }}
        run: |
          ssh -p "${SSH_PORT:-22}" "${{ secrets.ALIYUN_SSH_USER }}@${{ secrets.ALIYUN_HOST }}" \
            "GITHUB_SHA='${GITHUB_SHA}' APP_DIR='${{ steps.render_nginx.outputs.app_dir }}' NGINX_SITE_NAME='${{ steps.render_nginx.outputs.site_name }}' NGINX_SITE_DIR='${{ steps.render_nginx.outputs.site_dir }}' bash -s" <<'EOF'
          set -eu

          APP_DIR="${APP_DIR:-/opt/apps/bean-pop-studio}"
          NGINX_SITE_NAME="${NGINX_SITE_NAME:-site-bean-pop}"
          NGINX_SITE_DIR="${NGINX_SITE_DIR:-/etc/nginx/conf.d}"
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          BUNDLE_FILE="/tmp/bean-pop-$GITHUB_SHA.tgz"
          NGINX_TMP_FILE="/tmp/bean-pop-nginx-$GITHUB_SHA.conf"
          NGINX_CONF_FILE="$NGINX_SITE_DIR/$NGINX_SITE_NAME.conf"

          mkdir -p "$APP_DIR/releases" "$APP_DIR/shared" "$NGINX_SITE_DIR"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "$BUNDLE_FILE" -C "$RELEASE_DIR"
          rm -f "$BUNDLE_FILE"

          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"

          install -m 644 "$NGINX_TMP_FILE" "$NGINX_CONF_FILE"
          rm -f "$NGINX_TMP_FILE"
          nginx -t
          if command -v systemctl >/dev/null 2>&1; then
            systemctl reload nginx
          else
            service nginx reload
          fi

          cd "$APP_DIR/releases"
          ls -1dt */ 2>/dev/null | tail -n +6 | xargs -r rm -rf --
          EOF
